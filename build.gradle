buildscript {
    ext.kotlin_version = "$project.kotlinVersion"
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.12.1'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:2.2.10"
        classpath "de.mannodermaus.gradle.plugins:android-junit5:1.9.3.0"
    }
}

plugins {
    id "io.github.gradle-nexus.publish-plugin" version "1.3.0"
}

nexusPublishing {
    repositories {
        sonatype {
            nexusUrl.set(uri("https://ossrh-staging-api.central.sonatype.com/service/local/"))
            snapshotRepositoryUrl.set(uri("https://central.sonatype.com/repository/maven-snapshots/"))

            def sonatypeUsername = project.findProperty("sonatypeUsername")
            def sonatypePassword = project.findProperty("sonatypePassword")

            username.set(sonatypeUsername)
            password.set(sonatypePassword)
        }
    }
}
