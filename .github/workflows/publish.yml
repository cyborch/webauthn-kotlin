name: Publish to Maven Central

on:
  push:
    branches:
      - main
  release:
    types: [published]

concurrency:
  group: publish-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
        
    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
        
    - name: Run tests
      run: ./gradlew test testDebugUnitTest
      
    - name: Set snapshot version (main branch)
      if: github.ref == 'refs/heads/main'
      run: |
        sed -i 's/snapshotBuild=false/snapshotBuild=true/' gradle.properties
        
    - name: Set release version (release event)
      if: github.event_name == 'release'
      run: |
        sed -i 's/snapshotBuild=true/snapshotBuild=false/' gradle.properties
        
    - name: Build with Gradle
      run: ./gradlew build
        
    - name: Publish to Maven Central
      run: ./gradlew --max-workers=1 publish
      env:
        MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        GPG_SECRET_KEY_ID: ${{ secrets.GPG_SECRET_KEY_ID }}
        GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
        GPG_SECRET_PASSWORD: ${{ secrets.GPG_SECRET_PASSWORD }}
      
    - name: Cleanup Gradle Cache
      run: |
        rm -f ~/.gradle/caches/modules-2/modules-2.lock
        rm -f ~/.gradle/caches/modules-2/gc.properties