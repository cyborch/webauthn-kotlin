name: Publish to Maven Central

on:
  push:
    branches:
      - main
      - test/maven-deploy
  release:
    types: [published]

concurrency:
  group: publish-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests
      run: ./gradlew test testDebugUnitTest

    - name: Set snapshot version (all pushes)
      if: github.event_name != 'release'
      run: |
        sed -i 's/snapshotBuild=false/snapshotBuild=true/' gradle.properties

    - name: Set release version (release event only)
      if: github.event_name == 'release'
      run: |
        sed -i 's/snapshotBuild=true/snapshotBuild=false/' gradle.properties

    - name: Build with Gradle
      run: ./gradlew build

    - name: Debug - Check if secrets are available
      run: |
        echo "MAVEN_CENTRAL_USERNAME available: ${{ secrets.MAVEN_CENTRAL_USERNAME != '' }}"
        echo "MAVEN_CENTRAL_PASSWORD available: ${{ secrets.MAVEN_CENTRAL_PASSWORD != '' }}"
        echo "GPG_SECRET_KEY_ID available: ${{ secrets.GPG_SECRET_KEY_ID != '' }}"
        echo "GPG_SECRET_KEY available: ${{ secrets.GPG_SECRET_KEY != '' }}"
        echo "GPG_SECRET_PASSWORD available: ${{ secrets.GPG_SECRET_PASSWORD != '' }}"

    - name: Publish to the Maven Central Repository
      run: ./gradlew --max-workers=1 publishToSonatype closeAndReleaseSonatypeRepository
      env:
        ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.GPG_SECRET_KEY_ID }}
        ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SECRET_KEY }}
        ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_SECRET_PASSWORD }}

    - name: Cleanup Gradle Cache
      run: |
        rm -f ~/.gradle/caches/modules-2/modules-2.lock
        rm -f ~/.gradle/caches/modules-2/gc.properties
